<!DOCTYPE html>
<html lang="en-us">
    <head>
        <script src="https://integration.gamepix.com/sdk/v3/gamepix.sdk.js"></script>
        <script src="./gamepix-adapter.js"></script>
        <meta charset="utf-8">
        <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
        <title>Fruit Mixer</title>
        <style>
            html, body {
                width: 100%;
                height: 100%;
                padding: 0px;
                margin: 0px;
            }

            .fullscreen {
                background: #242424;
                width: 100vw;
                height: 100vh;
                position: absolute;
                top: 0px;
                left: 0px;
            }

            #canvas {
                background: #242424;
                width: 100%;
                height: 100%;
                position: absolute;
                top: 0px;
                left: 0px;
            }

            #loading-overlay {
                font-size: 20px;
                z-index: 1;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            #logo {
                width: 10%;
                max-width: 200px;
                min-width: 120px;
                overflow: hidden;
                border-radius: 22%;
                position: relative;
            }

            #logo-img {
                width: 100%;
                display: block;
            }

            #logo-fill {
                position: absolute;
                bottom: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background: #aa76ff;
                mix-blend-mode: color;
                transform: translateY(100%);
                transition: transform 0.3s ease-out;
                pointer-events: none;
            }

            #logo-shine {
                display: none;
                position: absolute;
                top: 0;
                left: -100%;
                width: 60%;
                height: 100%;
                background: linear-gradient(105deg, transparent 20%, rgba(255,255,255,0.55) 50%, transparent 80%);
                pointer-events: none;
            }

            .gradient-mover {
                animation: moveShine 0.45s linear forwards !important;
            }

            @keyframes moveShine {
                0%   { left: -60%; }
                100% { left: 110%; }
            }

            .logo-fade-out {
                animation: logoFadeOut 0.9s linear forwards;
            }

            @keyframes logoFadeOut {
                0%   { opacity: 1; }
                50%  { opacity: 0; }
                100% { opacity: 0; }
            }

            .fill-rect {
                transform: translateY(100%);
                transition: transform 0.3s ease-out;
            }

            #gradientMover {
                display: none;
            }

            #error-banner {
                display: none;
                position: absolute;
                top: 0; left: 0;
                width: 100%;
                padding: 12px 16px;
                background: #b00;
                color: #fff;
                font-family: Arial, sans-serif;
                font-size: 14px;
                z-index: 100;
                text-align: center;
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>
        <canvas id="canvas" class="fullscreen"></canvas>

        <div id="loading-overlay" class="fullscreen">
            <div id="logo">
                <img id="logo-img" src="game-icon.png" alt="Fruit Mixer">
                <div id="logo-fill" class="fill-rect"></div>
                <div id="logo-shine"></div>
            </div>
        </div>

        <div id="error-banner"></div>

        <script>
            (function() {
                var canvas = document.getElementById('canvas');
                function resizeCanvas() {
                    canvas.width  = window.innerWidth;
                    canvas.height = window.innerHeight;
                }
                resizeCanvas();
            })();

            var _loadingCompleted = false;

            window._unityProgressUpdate = function(pct) {
                if (_loadingCompleted) return;
                var fill = document.getElementById('logo-fill');
                if (fill) {
                    var translateY = 100 - Math.max(0, Math.min(100, pct));
                    fill.style.transform = 'translateY(' + translateY + '%)';
                }
            };

            window._unityShowError = function(msg) {
                var banner = document.getElementById('error-banner');
                if (banner) { banner.textContent = msg; banner.style.display = 'block'; }
            };

            window._unityHideLoading = function() {
                if (_loadingCompleted) return;
                _loadingCompleted = true;
                window._unityReady = true;
                var fill = document.getElementById('logo-fill');
                var shine = document.getElementById('logo-shine');
                var logo = document.getElementById('logo');
                var overlay = document.getElementById('loading-overlay');

                if (fill) {
                    fill.style.transform = 'translateY(0%)';
                }

                setTimeout(function() {
                    if (fill) fill.style.display = 'none';
                    if (shine) {
                        shine.style.display = 'block';
                        shine.classList.add('gradient-mover');
                    }
                }, 400);

                setTimeout(function() {
                    if (logo) logo.classList.add('logo-fade-out');
                }, 900);

                setTimeout(function() {
                    if (overlay) overlay.remove();
                }, 1400);
            };
        </script>

        <script src="./playgama-bridge-unity.js"></script>

        <script>
            window.addEventListener('load', function() {
                if (window.GamePix) {
                    GamePix.loaded().then(function() {
                        console.log("GamePix: Game Started");
                    });
                }
            });
        </script>
    </body>
</html>
