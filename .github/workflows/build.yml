name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy WebGL game files into Android assets
        run: |
          mkdir -p android/app/src/main/assets/game
          cp index.html android/app/src/main/assets/game/
          cp android-bridge.js android/app/src/main/assets/game/
          cp playgama-bridge-unity.js android/app/src/main/assets/game/
          cp game-icon.png android/app/src/main/assets/game/
          cp -r Build android/app/src/main/assets/game/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: FruitMixer-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
