name: Build & Sign APK (Amazon Appstore)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Copy WebGL game files into Android assets
        run: |
          mkdir -p android/app/src/main/assets/game
          cp index.html android/app/src/main/assets/game/
          cp android-bridge.js android/app/src/main/assets/game/
          cp playgama-bridge-unity.js android/app/src/main/assets/game/
          cp game-icon.png android/app/src/main/assets/game/
          cp -r Build android/app/src/main/assets/game/

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Decode keystore from secret
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/fruit-mixer-release.keystore

      - name: Sign APK with your keystore
        run: |
          BUILD_TOOLS=$(ls $ANDROID_HOME/build-tools | sort -V | tail -1)
          $ANDROID_HOME/build-tools/$BUILD_TOOLS/zipalign -v -p 4 \
            android/app/build/outputs/apk/release/app-release-unsigned.apk \
            android/app/build/outputs/apk/release/app-release-aligned.apk

          $ANDROID_HOME/build-tools/$BUILD_TOOLS/apksigner sign \
            --ks android/app/fruit-mixer-release.keystore \
            --ks-key-alias "${{ secrets.KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.KEY_PASSWORD }}" \
            --out android/app/build/outputs/apk/release/FruitMixer-release.apk \
            android/app/build/outputs/apk/release/app-release-aligned.apk

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: FruitMixer-Amazon-Release
          path: android/app/build/outputs/apk/release/FruitMixer-release.apk
