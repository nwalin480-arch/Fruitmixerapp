name: 🔑 Generate Keystore (Run Once)

on:
  workflow_dispatch:
    inputs:
      store_password:
        description: 'Choose a strong password for your keystore'
        required: true
      key_password:
        description: 'Choose a strong password for your key (can be same as above)'
        required: true
      developer_name:
        description: 'Your name or studio name (e.g. Rock City)'
        required: true
        default: 'Rock City'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Generate keystore
        run: |
          keytool -genkeypair -v \
            -keystore fruit-mixer-release.keystore \
            -alias fruit-mixer-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ github.event.inputs.store_password }}" \
            -keypass "${{ github.event.inputs.key_password }}" \
            -dname "CN=${{ github.event.inputs.developer_name }}, OU=Games, O=${{ github.event.inputs.developer_name }}, L=City, S=State, C=US"

      - name: Convert to base64
        run: |
          base64 -w 0 fruit-mixer-release.keystore > keystore-base64.txt
          echo ""
          echo "====== COPY EVERYTHING BELOW THIS LINE ======"
          cat keystore-base64.txt
          echo ""
          echo "====== COPY EVERYTHING ABOVE THIS LINE ======"

      - name: Upload keystore files
        uses: actions/upload-artifact@v4
        with:
          name: keystore-files
          path: |
            fruit-mixer-release.keystore
            keystore-base64.txt
          retention-days: 1
